<style>
* {
    box-sizing: border-box;
}

html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden; /* Elimina o scroll */
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at center, #0f2a1f 0%, #000000 70%);
    color: white;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 100%;
    max-width: 420px;
    height: 100dvh; /* Garante que fique na altura exata da tela */
    padding: 10px 15px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
}

/* FOTO DO TIPSTER MAIOR */
.profile-img {
    max-width: 240px;
    width: 60vw;
    height: auto;
    object-fit: contain;
}

h1 {
    font-size: 28px;
    color: #ff0000;
    margin: 5px 0;
    font-weight: bold;
    line-height: 1.1;
}

.subtext {
    font-size: 15px;
    color: #d9d9d9;
    margin-bottom: 5px;
}

.btn-wrapper {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* BOTÃO */
.button {
    display: inline-block;
    background-color: #ff0000;
    color: white;
    padding: 14px 30px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.3s ease;
    animation: pulse 1.5s infinite;
}

.button:hover {
    background-color: #cc0000;
}

/* ANIMAÇÃO PULSO */
@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255,0,0,0); }
    100% { transform: scale(1); }
}

/* SELO 100% CENTRALIZADO */
.stamp-button {
    display: block;
    margin: 12px auto 0 auto;
    max-width: 90%;
    width: 320px;
    height: auto;
}

.alert-box {
    margin: 2px 0;
}

.alert-box h2 {
    color: #00ff66;
    font-size: 17px;
    margin: 0 0 4px 0;
}

.alert-box p {
    color: #cccccc;
    font-size: 13px;
    margin: 0;
}

.footer {
    font-size: 12px;
    color: #777;
    margin-bottom: 5px;
}

        <img src="BATEUBET.png" alt="Selo Bateubet / Ministério da Fazenda" class="stamp-button">
    </div>

    <div class="alert-box">
        <h2>⚠ Entre e aguarde</h2>
        <p>As entradas serão enviadas em instantes!</p>
    </div>

    <div class="footer">
        Copyright © 2026 – Todos os direitos reservados
    </div>

</div>
