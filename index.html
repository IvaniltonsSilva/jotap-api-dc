<style>
* {
    box-sizing: border-box;
}

html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden; /* Mantém sem scroll */
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at center, #0f2a1f 0%, #000000 70%);
    color: white;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 100%;
    max-width: 420px;
    height: 100dvh;
    padding: 15px 0 0 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
}

/* BLOCO PRINCIPAL DENTRO DA TELA */
.main-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 0 20px;
    flex: 1; /* Ocupa o espaço central de forma proporcional */
    gap: 18px; /* Espaçamento padrão e equilibrado entre cada bloco */
}

/* FOTO DO TIPSTER */
.profile-img {
    max-width: 200px;
    width: 50vw;
    height: auto;
    object-fit: contain;
}

.title-box h1 {
    font-size: 28px;
    color: #ff0000;
    margin: 0 0 8px 0;
    font-weight: bold;
    line-height: 1.1;
}

.subtext {
    font-size: 15px;
    color: #d9d9d9;
    margin: 0;
}

/* BOTÃO COM MARGEM DE RESPIRO */
.btn-wrapper {
    margin: 8px 0;
}

.button {
    display: inline-block;
    background-color: #ff0000;
    color: white;
    padding: 16px 36px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.3s ease;
    animation: pulse 1.5s infinite;
}

.button:hover {
    background-color: #cc0000;
}

/* ANIMAÇÃO PULSO */
@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(255,0,0,0); }
    100% { transform: scale(1); }
}

/* BLOCO DO RODAPÉ (ALERT + COPYRIGHT + SELO) */
.footer-wrapper {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

.alert-box {
    padding: 0 20px;
}

.alert-box h2 {
    color: #00ff66;
    font-size: 16px;
    margin: 0 0 4px 0;
}

.alert-box p {
    color: #cccccc;
    font-size: 13px;
    margin: 0;
}

.footer {
    font-size: 11px;
    color: #777;
    padding: 0 20px;
}

/* SELO NO FIM DA PÁGINA (EXTENSO) */
.stamp-bottom {
    width: 100%;
    display: block;
    height: auto;
    margin: 0;
}
</style>

<body>

<div class="container">

    <!-- BLOCO SUPERIOR / CENTRAL (EQUILIBRADO) -->
    <div class="main-content">
        <img src="foto-perfil-6.png" alt="Foto do Tipster" class="profile-img">

        <div class="title-box">
            <h1>BILHETE<br>LIBERADO</h1>
            <p class="subtext">Clique no botão abaixo pra pegar seu bilhete!</p>
        </div>

        <div class="btn-wrapper">
            <a href="https://rd.redirecionar.online/" class="button" onclick="trackClick()">PEGAR AGORA</a>
        </div>
    </div>

    <!-- BLOCO INFERIOR (ORGANIZADO) -->
    <div class="footer-wrapper">
        <div class="alert-box">
            <h2>⚠ Entre e aguarde</h2>
            <p>As entradas serão enviadas em instantes!</p>
        </div>

        <div class="footer">
            Copyright © 2026 – Todos os direitos reservados
        </div>

        <img src="BATEUBET.png" alt="Selo Bateubet / Ministério da Fazenda" class="stamp-bottom">
    </div>

</div>

</body>
